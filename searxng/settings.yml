# Portable defaults. Override engines per egress (CAPTCHA / blocks) as needed.
use_default_settings: true

server:
  secret_key: "change-me-via-SEARXNG_SECRET"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

